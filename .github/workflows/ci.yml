name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Клонируем репозиторий
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Устанавливаем зависимости (g++, cmake)
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake

    # 3️⃣ Создаём каталог сборки
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake ..

    # 4️⃣ Сборка проекта
    - name: Build
      run: |
        cd build
        cmake --build . -- -j$(nproc)

